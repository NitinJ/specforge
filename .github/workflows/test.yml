name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          # The unit tier needs jsdom; the Playwright browser download is only
          # for the e2e tier (npm run test:e2e), which CI does not run here.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Run tests
        run: npm test
