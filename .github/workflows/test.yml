name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 20 + 22 only: `npm test` uses --test-force-exit, backported to
        # Node 20.14+/22+ (not the EOL 18.x on the runner). The plugin runtime
        # stays Node >=18 — it has no test runner / dev deps.
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          # The unit tier needs jsdom; the Playwright browser download is only
          # for the e2e tier (npm run test:e2e), which CI does not run here.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Run tests
        run: npm test
